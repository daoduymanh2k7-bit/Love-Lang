name: love_lang
description: A new Flutter project.
publish_to: 'none'

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: any
  firebase_storage: any
  flutter_riverpod: 2.5.1
  record: any
  audioplayers: any
  vibration: any
  flutter_local_notifications: ^17.2.4
  path_provider: any
  permission_handler: any
  image_picker: any
  cloudinary_public: ^0.23.1
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/lobby_illustration.png
    - assets/images/library_bg.png
    - assets/images/library_character_boy_reading.png
    - assets/images/library_character_girl_reading.png
    - assets/images/library_decor_calendar_clock.png
